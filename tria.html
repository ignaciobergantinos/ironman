<style>
  :root{
    --bg:#F5F6F8; --surface:#FFFFFF; --surface-2:#EEF1F4; --surface-3:#E6EAEF;
    --border:#E0E4EA; --border-strong:#CDD3DC;
    --text:#161B22; --muted:#5B6472; --faint:#8A93A1;
    --accent:#3B7DF0;
    --run:#F0492B; --swim:#0E96B4; --bike:#E0930A; --gym:#7B5CFF; --walk:#22A473;
    --good:#22A473; --warn:#E0930A; --hard:#F0492B; --long:#3B7DF0;
    --radius:16px; --radius-sm:11px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --shadow:0 1px 2px rgba(20,27,38,.05),0 8px 24px -12px rgba(20,27,38,.18);
    --shadow-lg:0 8px 40px -8px rgba(20,27,38,.28);
    --maxw:760px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0D1015; --surface:#161B22; --surface-2:#1D232D; --surface-3:#252C38;
      --border:#28303B; --border-strong:#333D4B;
      --text:#E8EDF2; --muted:#98A2B0; --faint:#6C7684;
      --accent:#5B95F7;
      --run:#FF6248; --swim:#2CB6D4; --bike:#F5A524; --gym:#9B80FF; --walk:#33C08C;
      --good:#33C08C; --warn:#F5A524; --hard:#FF6248; --long:#5B95F7;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -14px rgba(0,0,0,.6);
      --shadow-lg:0 12px 48px -8px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="light"]{
    --bg:#F5F6F8; --surface:#FFFFFF; --surface-2:#EEF1F4; --surface-3:#E6EAEF;
    --border:#E0E4EA; --border-strong:#CDD3DC;
    --text:#161B22; --muted:#5B6472; --faint:#8A93A1; --accent:#3B7DF0;
    --run:#F0492B; --swim:#0E96B4; --bike:#E0930A; --gym:#7B5CFF; --walk:#22A473;
    --good:#22A473; --warn:#E0930A; --hard:#F0492B; --long:#3B7DF0;
    --shadow:0 1px 2px rgba(20,27,38,.05),0 8px 24px -12px rgba(20,27,38,.18);
  }
  :root[data-theme="dark"]{
    --bg:#0D1015; --surface:#161B22; --surface-2:#1D232D; --surface-3:#252C38;
    --border:#28303B; --border-strong:#333D4B;
    --text:#E8EDF2; --muted:#98A2B0; --faint:#6C7684; --accent:#5B95F7;
    --run:#FF6248; --swim:#2CB6D4; --bike:#F5A524; --gym:#9B80FF; --walk:#33C08C;
    --good:#33C08C; --warn:#F5A524; --hard:#FF6248; --long:#5B95F7;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -14px rgba(0,0,0,.6);
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.45;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px 120px;}
  button{font-family:inherit;cursor:pointer;color:inherit}
  input,textarea,select{font-family:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--faint)}

  /* spectrum rail */
  .spectrum{height:4px;background:linear-gradient(90deg,var(--run) 0 20%,var(--gym) 20% 40%,var(--bike) 40% 60%,var(--swim) 60% 80%,var(--walk) 80% 100%);position:sticky;top:0;z-index:40}

  /* appbar */
  .appbar{position:sticky;top:4px;z-index:30;background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--border)}
  .appbar-in{max-width:var(--maxw);margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;flex-direction:column;line-height:1.05;margin-right:auto}
  .brand b{font-size:19px;font-weight:800;letter-spacing:-.02em}
  .brand span{font-size:11.5px;color:var(--muted);font-weight:600}
  .iconbtn{width:38px;height:38px;display:grid;place-items:center;border-radius:11px;
    border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:.15s}
  .iconbtn:hover{color:var(--text);border-color:var(--border-strong)}
  .iconbtn svg{width:18px;height:18px}

  /* week nav */
  .weeknav{display:flex;align-items:center;gap:10px;margin:18px 2px 14px}
  .weeknav h2{font-size:15px;font-weight:800;letter-spacing:-.01em;margin:0}
  .weeknav .sub{font-size:12px;color:var(--muted);font-weight:600}
  .navbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    color:var(--muted);display:grid;place-items:center}
  .navbtn:hover{color:var(--text)}
  .navbtn svg{width:16px;height:16px}
  .today-btn{margin-left:auto;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:10px;
    border:1px solid var(--border);background:var(--surface);color:var(--text)}
  .today-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* progress strip */
  .adh{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:16px}
  .ring{--p:0;width:52px;height:52px;flex:0 0 auto;border-radius:50%;
    background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--surface-3) 0);
    display:grid;place-items:center;position:relative}
  .ring::after{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--surface)}
  .ring b{position:relative;z-index:1;font-size:13px;font-weight:800;font-family:var(--mono)}
  .adh-txt{flex:1 1 auto}
  .adh-txt .big{font-weight:800;font-size:15px;letter-spacing:-.01em}
  .adh-txt .small{font-size:12.5px;color:var(--muted);margin-top:1px}
  .miniweek{display:flex;gap:4px}
  .miniweek i{width:9px;height:26px;border-radius:3px;background:var(--surface-3);display:block}
  .miniweek i.on{background:var(--accent)}

  /* day cards */
  .days{display:flex;flex-direction:column;gap:12px}
  .day{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden}
  .day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--shadow)}
  .day.rest{opacity:.96}
  .day-h{display:flex;align-items:baseline;gap:8px;padding:13px 15px 4px}
  .day-h .dow{font-weight:800;font-size:14.5px;letter-spacing:-.01em;text-transform:capitalize}
  .day-h .date{font-size:12px;color:var(--faint);font-weight:600;font-family:var(--mono)}
  .day-h .todaypill{margin-left:auto;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent);padding:3px 8px;border-radius:20px}
  .slots{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-top:9px}
  @media (max-width:520px){.slots{grid-template-columns:1fr}}
  .slot{background:var(--surface);padding:12px 15px;min-height:74px}
  .slot-lab{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:9px;display:flex;align-items:center;gap:6px}
  .sess{width:100%;text-align:left;background:transparent;border:none;padding:0;display:flex;align-items:center;gap:11px}
  .sess-ic{width:34px;height:34px;flex:0 0 auto;border-radius:10px;display:grid;place-items:center;color:#fff}
  .sess-ic svg{width:19px;height:19px}
  .sess-main{min-width:0;flex:1}
  .sess-name{font-weight:700;font-size:13.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sess-sub{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:2px}
  .idot{width:6px;height:6px;border-radius:50%;flex:0 0 auto}
  .check{width:20px;height:20px;flex:0 0 auto;border-radius:50%;border:1.8px solid var(--border-strong);display:grid;place-items:center;color:transparent}
  .sess.done .check{background:var(--good);border-color:var(--good);color:#fff}
  .sess.done .check svg{width:12px;height:12px}
  .sess.done .sess-name{color:var(--muted)}
  .addbtn{width:100%;background:transparent;border:1.5px dashed var(--border-strong);border-radius:11px;
    padding:9px;color:var(--muted);font-size:12.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
  .addbtn:hover{color:var(--text);border-color:var(--muted)}
  .addbtn svg{width:15px;height:15px}
  .restnote{padding:14px 15px 16px;color:var(--muted);font-size:12.5px}
  .extra{position:relative}
  .extra .exdel{position:absolute;top:-6px;right:-4px;width:22px;height:22px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);color:var(--faint);display:none;place-items:center}
  .slot:hover .extra .exdel{display:grid}
  .extra .exdel svg{width:12px;height:12px}

  .picker{display:flex;gap:7px;flex-wrap:wrap;padding-top:4px}
  .picker button{border:1px solid var(--border);background:var(--surface-2);border-radius:9px;padding:7px 11px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
  .picker button svg{width:14px;height:14px}
  .picker button:hover{border-color:var(--border-strong)}

  /* sheet / modal */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(10,13,18,.5);backdrop-filter:blur(2px);
    display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:auto}
  .sheet{width:100%;max-width:640px;max-height:92vh;background:var(--bg);border-radius:22px 22px 0 0;
    box-shadow:var(--shadow-lg);display:flex;flex-direction:column;transform:translateY(16px);transition:transform .22s cubic-bezier(.2,.7,.3,1);overflow:hidden}
  .overlay.open .sheet{transform:translateY(0)}
  @media (min-width:640px){.overlay{align-items:center;padding:20px}.sheet{border-radius:22px;max-height:88vh}}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--border-strong);margin:9px auto 2px}
  .sheet-scroll{overflow-y:auto;padding:6px 18px 26px;-webkit-overflow-scrolling:touch}
  .sheet-hero{display:flex;align-items:center;gap:13px;padding:10px 2px 16px}
  .sheet-hero .sess-ic{width:46px;height:46px;border-radius:13px}
  .sheet-hero .sess-ic svg{width:25px;height:25px}
  .sheet-hero h3{margin:0;font-size:18px;font-weight:800;letter-spacing:-.02em}
  .sheet-hero .meta{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .itag{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
  .donebig{margin-left:auto;flex:0 0 auto;display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;
    border:1.5px solid var(--border-strong);background:var(--surface);border-radius:12px;padding:8px 12px;color:var(--muted)}
  .donebig .check{width:19px;height:19px}
  .donebig.on{background:var(--good);border-color:var(--good);color:#fff}
  .donebig.on .check{background:#fff;border-color:#fff;color:var(--good)}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;margin-bottom:13px;box-shadow:var(--shadow)}
  .card-lab{display:flex;align-items:center;gap:7px;margin-bottom:11px}
  .card-lab .eyebrow{margin:0}
  .card-lab .tag{margin-left:auto;font-size:11px;font-weight:700;color:var(--muted);font-family:var(--mono);background:var(--surface-2);padding:3px 9px;border-radius:20px}
  .plan-steps{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
  .plan-steps li{display:flex;gap:11px;font-size:13.5px;align-items:flex-start}
  .plan-steps li .n{flex:0 0 auto;width:18px;height:18px;border-radius:50%;background:var(--surface-2);color:var(--muted);
    font-size:10.5px;font-weight:800;display:grid;place-items:center;margin-top:1px;font-family:var(--mono)}

  /* stat grid */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
  .inp{display:flex;align-items:baseline;gap:6px;background:var(--surface-2);border:1.5px solid transparent;border-radius:11px;padding:10px 12px;transition:.15s}
  .inp:focus-within{border-color:var(--accent);background:var(--surface)}
  .inp input{border:none;background:transparent;outline:none;width:100%;color:var(--text);
    font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:17px;font-weight:600;min-width:0}
  .inp .unit{font-size:12px;color:var(--faint);font-weight:600;white-space:nowrap}
  .field.derived .inp{background:transparent;border:1.5px dashed var(--border);}
  .field.derived input{color:var(--accent)}

  /* gym */
  .ex{border:1px solid var(--border);border-radius:13px;margin-bottom:10px;overflow:hidden;background:var(--surface)}
  .ex-h{display:flex;align-items:center;gap:10px;padding:12px 14px;width:100%;background:transparent;border:none;text-align:left}
  .ex-h .exn{font-weight:700;font-size:13.5px;flex:1;letter-spacing:-.01em}
  .ex-h .ext{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--surface-2);padding:3px 9px;border-radius:8px;white-space:nowrap}
  .ex-h .chev{width:16px;height:16px;color:var(--faint);transition:transform .18s}
  .ex.open .ex-h .chev{transform:rotate(90deg)}
  .ex-h .filled{width:7px;height:7px;border-radius:50%;background:var(--gym);opacity:0;flex:0 0 auto}
  .ex.hasdata .ex-h .filled{opacity:1}
  .ex-body{display:none;padding:2px 14px 13px}
  .ex.open .ex-body{display:block}
  .setrow{display:grid;grid-template-columns:52px 1fr 1fr;gap:9px;align-items:center;margin-top:8px}
  .setrow .sname{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.04em}
  .setrow .inp{padding:8px 10px}
  .setrow .inp input{font-size:15px}
  .sethead{display:grid;grid-template-columns:52px 1fr 1fr;gap:9px;margin-top:4px}
  .sethead span{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);text-align:center}
  .sethead span:first-child{text-align:left}

  /* rpe */
  .rpe-row{display:flex;align-items:center;gap:12px}
  .rpe-track{flex:1}
  .rpe-track input[type=range]{width:100%;accent-color:var(--accent);height:22px}
  .rpe-val{font-family:var(--mono);font-weight:800;font-size:20px;width:44px;text-align:right}
  .rpe-val small{font-size:11px;color:var(--faint);font-weight:600}
  textarea.notes{width:100%;background:var(--surface-2);border:1.5px solid transparent;border-radius:11px;padding:11px 12px;
    color:var(--text);font-size:14px;resize:vertical;min-height:64px;outline:none}
  textarea.notes:focus{border-color:var(--accent);background:var(--surface)}

  /* progress view */
  .tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:16px}
  @media (min-width:520px){.tiles{grid-template-columns:repeat(3,1fr)}}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 15px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .tile .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
  .tile .lab{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:6px}
  .tile .lab svg{width:13px;height:13px}
  .tile .num{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:800;font-size:26px;letter-spacing:-.02em;margin-top:8px}
  .tile .num small{font-size:13px;color:var(--muted);font-weight:600;margin-left:3px}
  .tile .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .trend{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
  .trend h4{margin:0 0 3px;font-size:14px;font-weight:800;letter-spacing:-.01em}
  .trend .cap{font-size:12px;color:var(--muted);margin-bottom:16px}
  .bars{display:flex;align-items:flex-end;gap:8px;height:110px}
  .bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bars .col .b{width:100%;max-width:26px;background:var(--surface-3);border-radius:5px 5px 3px 3px;position:relative;transition:.2s}
  .bars .col .b .fill{position:absolute;bottom:0;left:0;right:0;background:var(--accent);border-radius:5px 5px 3px 3px}
  .bars .col.cur .b .fill{background:var(--accent)}
  .bars .col .v{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted)}
  .bars .col .k{font-size:10px;color:var(--faint);font-weight:600}
  .bars .col.cur .k{color:var(--accent)}

  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .legend div{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted)}
  .legend .sw{width:11px;height:11px;border-radius:4px}

  .section-title{font-size:13px;font-weight:800;letter-spacing:-.01em;margin:22px 2px 12px;display:flex;align-items:center;gap:8px}
  .danger{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:12px;font-size:13px;font-weight:600;margin-top:8px}
  .danger:hover{border-color:var(--hard);color:var(--hard)}

  /* tabbar */
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:color-mix(in srgb,var(--bg) 85%,transparent);
    backdrop-filter:blur(14px) saturate(1.4);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
  .tabbar-in{max-width:var(--maxw);margin:0 auto;display:flex}
  .tab{flex:1;background:transparent;border:none;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);font-size:11px;font-weight:700}
  .tab svg{width:22px;height:22px}
  .tab.active{color:var(--accent)}

  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(10px);z-index:70;
    background:var(--text);color:var(--bg);font-size:12.5px;font-weight:700;padding:9px 16px;border-radius:22px;
    box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.22s;display:flex;align-items:center;gap:7px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast svg{width:15px;height:15px}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:13.5px}
  .hidden{display:none!important}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="spectrum"></div>
<header class="appbar">
  <div class="appbar-in">
    <div class="brand">
      <b>Tría</b><span>Camino al Ironman · 12 sesiones/sem</span>
    </div>
    <button class="iconbtn" id="btn-theme" title="Cambiar tema" aria-label="Cambiar tema"></button>
    <button class="iconbtn" id="btn-export" title="Exportar datos" aria-label="Exportar datos"></button>
    <button class="iconbtn" id="btn-import" title="Importar datos" aria-label="Importar datos"></button>
    <input type="file" id="file-import" accept="application/json" class="hidden">
  </div>
</header>

<main class="wrap" id="view"></main>

<nav class="tabbar"><div class="tabbar-in" id="tabs"></div></nav>

<div class="overlay" id="overlay"><div class="sheet"><div class="grab"></div><div class="sheet-scroll" id="sheet"></div></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------- icons ---------- */

/* ---------- storage ---------- */
const LS='tria.store.v1';
let store={logs:{},extras:{}};
try{const r=localStorage.getItem(LS); if(r) store=Object.assign(store,JSON.parse(r));}catch(e){}
let saveT=null;
function persist(){try{localStorage.setItem(LS,JSON.stringify(store));}catch(e){}}
function save(silent){clearTimeout(saveT);saveT=setTimeout(()=>{persist(); if(!silent) toast('Guardado');},250);}
function getLog(id){return store.logs[id]||(store.logs[id]={});}

/* ---------- date utils ---------- */
function iso(d){const m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return d.getFullYear()+'-'+m+'-'+day;}
function mondayOf(d){const x=new Date(d);const g=x.getDay();x.setDate(x.getDate()+(g===0?-6:1-g));x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function fmtDate(d){return d.getDate()+' '+MONTHS[d.getMonth()];}
let cursor=mondayOf(new Date());
const todayISO=iso(new Date());

/* ---------- time helpers ---------- */
function parseTime(s){if(s==null)return null;s=(''+s).trim();if(!s)return null;const p=s.split(':').map(x=>parseFloat(x));if(p.some(isNaN))return null;if(p.length===1)return p[0]*60;if(p.length===2)return p[0]*60+p[1];return p[0]*3600+p[1]*60+p[2];}
function fmtDur(sec){if(sec==null)return'—';sec=Math.round(sec);const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;const pad=n=>String(n).padStart(2,'0');return h?h+':'+pad(m)+':'+pad(s):m+':'+pad(s);}
function fmtPace(sec){if(sec==null||!isFinite(sec))return'—';const m=Math.floor(sec/60),s=Math.round(sec%60);return m+':'+String(s).padStart(2,'0');}
function derive(disc,d){const t=parseTime(d.time),dist=parseFloat(d.dist);
  if((disc==='run'||disc==='walk')){if(t&&dist>0)return{l:'Ritmo',v:fmtPace(t/dist),u:'/km'};return{l:'Ritmo',v:'—',u:'/km'};}
  if(disc==='bike'){if(t&&dist>0)return{l:'Velocidad',v:(dist/(t/3600)).toFixed(1),u:'km/h'};return{l:'Velocidad',v:'—',u:'km/h'};}
  if(disc==='swim'){if(t&&dist>0)return{l:'Ritmo',v:fmtPace(t/(dist/100)),u:'/100m'};return{l:'Ritmo',v:'—',u:'/100m'};}
  return null;}

/* ---------- session resolution ---------- */
function templSessions(date){const def=byDow[date.getDay()];return (def?def.sessions:[]).map(s=>({...s,id:iso(date)+':'+s.slot,kind:'templ',date:iso(date)}));}
function extraSessions(date){const k=iso(date);return (store.extras[k]||[]).map(e=>({disc:e.disc,name:e.name||DISC[e.disc].label,intensity:e.intensity||'Suave',id:e.id,kind:'extra',date:k,plan:null}));}
function isDone(id){return !!(store.logs[id]&&store.logs[id].done);}
function hasData(id){const l=store.logs[id];if(!l)return false;return Object.keys(l).some(k=>k!=='done'&&l[k]!=null&&l[k]!==''&&!(typeof l[k]==='object'&&Object.keys(l[k]).length===0));}

/* ---------- render: helpers ---------- */
function discIcon(disc,size){return `<span class="sess-ic" style="background:${DISC[disc].color}">${IC[disc]}</span>`;}
function sessionRow(s){
  const done=isDone(s.id), data=hasData(s.id);
  const sub= s.routine? ROUTINES[s.routine].ex.length+' ejercicios' : (s.plan&&s.plan.tag? s.plan.tag : DISC[s.disc].label);
  return `<button class="sess ${done?'done':''}" data-open="${s.id}">
    ${discIcon(s.disc)}
    <span class="sess-main">
      <span class="sess-name">${s.name}</span>
      <span class="sess-sub"><span class="idot" style="background:${INT[s.intensity].c}"></span>${s.intensity} · ${sub}${data&&!done?' · <b style="color:var(--accent)">•</b>':''}</span>
    </span>
    <span class="check">${IC.check}</span>
  </button>`;
}

/* ---------- view: week ---------- */
function renderWeek(){
  const start=cursor, end=addDays(start,6);
  const sameMonth=start.getMonth()===end.getMonth();
  const title= sameMonth? `${start.getDate()}–${end.getDate()} ${MONTHS[end.getMonth()]} ${end.getFullYear()}`
    : `${fmtDate(start)} – ${fmtDate(end)}`;
  // adherence
  let done=0,total=0,mini=[];
  for(let i=0;i<7;i++){const d=addDays(start,i);const ss=[...templSessions(d),...extraSessions(d)];let dd=0;ss.forEach(s=>{total++;if(isDone(s.id)){done++;dd++;}});mini.push({n:ss.length,done:dd});}
  const pct= total? Math.round(done/total*100):0;
  let html=`<div class="weeknav">
    <button class="navbtn" data-week="-1" aria-label="Semana anterior">${IC.left}</button>
    <div><h2>${title}</h2><div class="sub mono">Semana de entreno</div></div>
    <button class="navbtn" data-week="1" aria-label="Semana siguiente">${IC.right}</button>
    <button class="today-btn" data-week="0">Hoy</button>
  </div>`;
  html+=`<div class="adh">
    <div class="ring" style="--p:${pct}"><b>${pct}%</b></div>
    <div class="adh-txt"><div class="big mono">${done} / ${total} sesiones</div><div class="small">completadas esta semana</div></div>
    <div class="miniweek">${mini.map(m=>{let cells='';for(let i=0;i<Math.max(m.n,1);i++)cells+=`<i class="${i<m.done?'on':''}"></i>`;return cells;}).join('')}</div>
  </div>`;
  html+='<div class="days">';
  for(let i=0;i<7;i++){
    const d=addDays(start,i), k=iso(d), def=byDow[d.getDay()];
    const isToday=k===todayISO;
    const templ=templSessions(d), extra=extraSessions(d);
    html+=`<div class="day ${isToday?'today':''} ${def.rest?'rest':''}">
      <div class="day-h"><span class="dow">${def.day}</span><span class="date">${fmtDate(d)}</span>${isToday?'<span class="todaypill">Hoy</span>':''}</div>`;
    if(def.rest && templ.length===0 && extra.length===0){
      html+=`<div class="restnote">Descanso o recuperación activa. Puedes añadir una caminata o nado suave.</div>`;
    }
    html+='<div class="slots">';
    const slots=[['am','Mañana · fuerte'],['pm','Tarde · suave']];
    if(def.rest){
      html+=`<div class="slot" style="grid-column:1/-1">${extra.map(s=>`<div class="extra" style="margin-bottom:8px">${sessionRow(s)}<button class="exdel" data-del="${s.id}" data-date="${k}">${IC.x}</button></div>`).join('')}</div>`;
    } else {
      slots.forEach(([sl,lab])=>{
        const s=templ.find(x=>x.slot===sl);
        html+=`<div class="slot"><div class="slot-lab">${lab}</div>${s?sessionRow(s):''}</div>`;
      });
    }
    html+='</div>';
    // extras + add
    const extraHtml = def.rest? '' : extra.map(s=>`<div class="extra" style="margin:0 15px 10px">${sessionRow(s)}<button class="exdel" data-del="${s.id}" data-date="${k}">${IC.x}</button></div>`).join('');
    html+=extraHtml;
    html+=`<div style="padding:6px 15px 14px"><div class="picker hidden" id="pick-${k}">${Object.keys(DISC).map(dk=>`<button data-add="${dk}" data-date="${k}">${IC[dk]} ${DISC[dk].label}</button>`).join('')}</div>
      <button class="addbtn" data-toggleadd="${k}">${IC.plus} Añadir sesión extra</button></div>`;
    html+='</div>';
  }
  html+='</div>';
  return html;
}

/* ---------- view: today ---------- */
function renderToday(){
  const now=new Date(); const d=new Date(now); d.setHours(0,0,0,0);
  const def=byDow[d.getDay()];
  const templ=templSessions(d), extra=extraSessions(d), k=iso(d);
  let html=`<div class="weeknav"><div><h2 style="text-transform:capitalize">${DOW_LONG[d.getDay()]}</h2><div class="sub mono">${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div></div></div>`;
  if(templ.length===0 && extra.length===0){
    html+=`<div class="card"><div class="card-lab"><span class="eyebrow">Descanso</span></div><p style="margin:0;color:var(--muted);font-size:13.5px">Hoy toca descansar o recuperación activa. Añade una caminata suave si te apetece moverte.</p></div>`;
  }
  const all=[...templ,...extra];
  html+='<div class="days"><div class="day"><div class="slots" style="grid-template-columns:1fr">';
  all.forEach(s=>{
    const lab= s.kind==='extra'?'Extra': (s.slot==='am'?'Mañana · fuerte':'Tarde · suave');
    html+=`<div class="slot"><div class="slot-lab">${lab}</div>${sessionRow(s)}</div>`;
  });
  html+='</div></div></div>';
  html+=`<div style="padding:14px 2px"><div class="picker hidden" id="pick-${k}">${Object.keys(DISC).map(dk=>`<button data-add="${dk}" data-date="${k}">${IC[dk]} ${DISC[dk].label}</button>`).join('')}</div>
    <button class="addbtn" data-toggleadd="${k}">${IC.plus} Añadir sesión extra</button></div>`;
  return html;
}

/* ---------- view: progress ---------- */
function weekVolume(mon){
  let v={run:0,bike:0,swim:0,walk:0,gymDone:0,done:0,total:0};
  for(let i=0;i<7;i++){const d=addDays(mon,i);const ss=[...templSessions(d),...extraSessions(d)];
    ss.forEach(s=>{v.total++;const l=store.logs[s.id];const dn=l&&l.done;if(dn)v.done++;
      if(s.disc==='gym'){if(dn)v.gymDone++;return;}
      const dist=l&&parseFloat(l.dist);if(dist>0){if(s.disc==='swim')v.swim+=dist;else v[s.disc]+=dist;}});}
  return v;
}
function renderProgress(){
  const v=weekVolume(cursor);
  const tiles=[
    {k:'run',lab:'Carrera',ic:IC.run,val:v.run.toFixed(1),u:'km'},
    {k:'bike',lab:'Bici',ic:IC.bike,val:v.bike.toFixed(1),u:'km'},
    {k:'swim',lab:'Natación',ic:IC.swim,val:Math.round(v.swim),u:'m'},
    {k:'gym',lab:'Gimnasio',ic:IC.gym,val:v.gymDone,u:'sesiones'},
    {k:'walk',lab:'Caminata',ic:IC.walk,val:v.walk.toFixed(1),u:'km'},
    {k:'run',lab:'Adherencia',ic:IC.today,val:v.done,u:'/ '+v.total,accent:1},
  ];
  let html=`<div class="weeknav"><div><h2>Progreso</h2><div class="sub mono">Volumen de la semana en curso</div></div><button class="today-btn" data-week="0">Hoy</button></div>`;
  html+='<div class="tiles">';
  tiles.forEach(t=>{const c= t.accent?'var(--accent)':DISC[t.k].color;
    html+=`<div class="tile"><span class="bar" style="background:${c}"></span>
      <div class="lab" style="color:${c}">${t.ic}${t.lab}</div>
      <div class="num">${t.val}<small>${t.u}</small></div></div>`;});
  html+='</div>';
  // 8-week trend of completed sessions
  const weeks=[];let max=1;
  for(let i=7;i>=0;i--){const mon=addDays(cursor,-7*i);const v2=weekVolume(mon);weeks.push({mon,done:v2.done,total:v2.total});max=Math.max(max,v2.total);}
  html+=`<div class="trend"><h4>Constancia · 8 semanas</h4><div class="cap">Sesiones completadas por semana</div><div class="bars">`;
  weeks.forEach((w,idx)=>{const cur=idx===weeks.length-1;const h=Math.round(w.done/max*100);
    html+=`<div class="col ${cur?'cur':''}"><div class="v">${w.done}</div><div class="b" style="height:100%"><div class="fill" style="height:${h}%"></div></div><div class="k mono">${w.mon.getDate()}/${w.mon.getMonth()+1}</div></div>`;});
  html+='</div></div>';
  html+=`<div class="legend">${Object.keys(DISC).map(k=>`<div><span class="sw" style="background:${DISC[k].color}"></span>${DISC[k].label}</div>`).join('')}</div>`;
  html+=`<div class="section-title">Datos</div>
    <button class="danger" id="btn-reset">Borrar todos los registros</button>`;
  return html;
}

/* ---------- sheet: session detail ---------- */
let openId=null;
function findSession(id){
  const dateStr=id.split(':')[0];const d=new Date(dateStr+'T00:00:00');
  const t=templSessions(d).find(s=>s.id===id); if(t) return t;
  const e=extraSessions(d).find(s=>s.id===id); return e;
}
function openSession(id){
  const s=findSession(id); if(!s)return; openId=id;
  const l=getLog(id);
  const dd=new Date(s.date+'T00:00:00');
  const dayLabel=`${DOW_LONG[dd.getDay()]} · ${dd.getDate()} ${MONTHS[dd.getMonth()]}`;
  const slotLabel= s.kind==='extra'?'Sesión extra':(s.slot==='am'?'Mañana':'Tarde');
  let html=`<div class="sheet-hero">
    ${discIcon(s.disc)}
    <div style="min-width:0"><h3>${s.name}</h3>
      <div class="meta"><span>${dayLabel} · ${slotLabel}</span>
      <span class="itag" style="color:${INT[s.intensity].c};background:color-mix(in srgb,${INT[s.intensity].c} 15%,transparent)">${s.intensity}</span></div>
    </div>
    <button class="donebig ${l.done?'on':''}" id="doneToggle"><span class="check">${IC.check}</span>${l.done?'Hecho':'Marcar'}</button>
  </div>`;
  // plan
  if(s.routine){
    const R=ROUTINES[s.routine];
    html+=`<div class="card-lab" style="padding:0 2px"><span class="eyebrow">Rutina · ${R.label}</span><span class="tag">${R.ex.length} ejercicios</span></div>`;
    html+='<div>';
    R.ex.forEach((e,ei)=>{
      const sets=l.ex&&l.ex[ei]||[];
      const filled=sets.some(x=>x&&(x.kg||x.reps));
      let rows='';
      for(let si=0;si<e.s;si++){const cur=sets[si]||{};
        rows+=`<div class="setrow"><span class="sname">Serie ${si+1}</span>
          <div class="inp"><input inputmode="decimal" data-ex="${ei}" data-set="${si}" data-k="kg" value="${cur.kg!=null?cur.kg:''}" placeholder="kg"><span class="unit">kg</span></div>
          <div class="inp"><input inputmode="numeric" data-ex="${ei}" data-set="${si}" data-k="reps" value="${cur.reps!=null?cur.reps:''}" placeholder="${e.r}"><span class="unit">reps</span></div>
        </div>`;}
      html+=`<div class="ex ${filled?'hasdata':''}"><button class="ex-h" data-extoggle="${ei}"><span class="filled"></span><span class="exn">${e.n}</span><span class="ext">${e.s}×${e.r}</span><span class="chev">${IC.chev}</span></button>
        <div class="ex-body"><div class="sethead"><span>Serie</span><span>Peso</span><span>Reps</span></div>${rows}</div></div>`;
    });
    html+='</div>';
  } else {
    if(s.plan){
      html+=`<div class="card"><div class="card-lab"><span class="eyebrow">Plan de hoy</span>${s.plan.tag?`<span class="tag">${s.plan.tag}</span>`:''}</div>
        <ul class="plan-steps">${s.plan.steps.map((st,i)=>`<li><span class="n">${i+1}</span><span>${st}</span></li>`).join('')}</ul></div>`;
    }
    // stat fields
    const fs=FIELDS[s.disc]||FIELDS.run;
    const der=derive(s.disc,l);
    html+=`<div class="card"><div class="card-lab"><span class="eyebrow">Tus datos</span></div><div class="stats">`;
    fs.forEach(f=>{
      html+=`<div class="field"><label>${f.l}</label><div class="inp"><input inputmode="${f.time?'text':'decimal'}" data-field="${f.k}" value="${l[f.k]!=null?l[f.k]:''}" placeholder="${f.ph}"><span class="unit">${f.u}</span></div></div>`;
    });
    if(der){html+=`<div class="field derived"><label>${der.l}</label><div class="inp"><input class="mono" id="derived" readonly value="${der.v}"><span class="unit">${der.u}</span></div></div>`;}
    html+='</div></div>';
  }
  // rpe + notes
  const rpe=l.rpe||5;
  html+=`<div class="card"><div class="card-lab"><span class="eyebrow">Esfuerzo percibido (RPE)</span></div>
    <div class="rpe-row"><div class="rpe-track"><input type="range" min="1" max="10" step="1" value="${rpe}" data-field="rpe" id="rpeIn"></div><div class="rpe-val"><span id="rpeVal">${rpe}</span><small>/10</small></div></div></div>`;
  html+=`<div class="card"><div class="card-lab"><span class="eyebrow">Notas</span></div>
    <textarea class="notes" data-field="notes" placeholder="Sensaciones, ritmo, tiempo, molestias…">${l.notes||''}</textarea></div>`;
  if(s.kind==='extra'){html+=`<button class="danger" data-del="${id}" data-date="${s.date}" data-fromsheet="1">Eliminar esta sesión extra</button>`;}

  document.getElementById('sheet').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  bindSheet(s);
}
function bindSheet(s){
  const sheet=document.getElementById('sheet');
  // done toggle
  const dt=document.getElementById('doneToggle');
  if(dt)dt.onclick=()=>{const l=getLog(openId);l.done=!l.done;dt.classList.toggle('on',l.done);dt.lastChild.textContent=l.done?'Hecho':'Marcar';save();};
  // exercise expand
  sheet.querySelectorAll('[data-extoggle]').forEach(b=>b.onclick=()=>b.closest('.ex').classList.toggle('open'));
  // gym set inputs
  sheet.querySelectorAll('input[data-ex]').forEach(inp=>inp.oninput=()=>{
    const l=getLog(openId);l.ex=l.ex||{};const ei=+inp.dataset.ex,si=+inp.dataset.set;
    l.ex[ei]=l.ex[ei]||[];l.ex[ei][si]=l.ex[ei][si]||{};
    l.ex[ei][si][inp.dataset.k]=inp.value===''?null:inp.value;
    const ex=inp.closest('.ex');const any=(l.ex[ei]||[]).some(x=>x&&(x.kg||x.reps));ex.classList.toggle('hasdata',any);
    save(true);
  });
  // field inputs
  sheet.querySelectorAll('input[data-field],textarea[data-field]').forEach(inp=>{
    if(inp.type==='range'){inp.oninput=()=>{getLog(openId).rpe=+inp.value;document.getElementById('rpeVal').textContent=inp.value;save(true);};return;}
    inp.oninput=()=>{const l=getLog(openId);l[inp.dataset.field]=inp.value===''?null:inp.value;
      const der=derive(s.disc,l);const de=document.getElementById('derived');if(de&&der)de.value=der.v;save(true);};
  });
  sheet.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delExtra(b.dataset.del,b.dataset.date,true));
}
function closeSheet(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';openId=null;render();}

/* ---------- extras ---------- */
function addExtra(disc,dateK){
  store.extras[dateK]=store.extras[dateK]||[];
  const id=dateK+':x'+Date.now();
  store.extras[dateK].push({id,disc,name:DISC[disc].label+' · extra',intensity:'Suave'});
  persist();render();openSession(id);
}
function delExtra(id,dateK,fromSheet){
  if(!confirm('¿Eliminar esta sesión y sus datos?'))return;
  if(store.extras[dateK])store.extras[dateK]=store.extras[dateK].filter(e=>e.id!==id);
  delete store.logs[id];persist();
  if(fromSheet)closeSheet();else render();
  toast('Eliminada');
}

/* ---------- app shell ---------- */
let view='week';
function render(){
  const v=document.getElementById('view');
  if(view==='week')v.innerHTML=renderWeek();
  else if(view==='today')v.innerHTML=renderToday();
  else v.innerHTML=renderProgress();
  bindView();
  renderTabs();
}
function bindView(){
  const v=document.getElementById('view');
  v.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openSession(b.dataset.open));
  v.querySelectorAll('[data-week]').forEach(b=>b.onclick=()=>{const n=+b.dataset.week;cursor= n===0?mondayOf(new Date()):addDays(cursor,7*n);render();});
  v.querySelectorAll('[data-toggleadd]').forEach(b=>b.onclick=()=>{const p=document.getElementById('pick-'+b.dataset.toggleadd);if(p)p.classList.toggle('hidden');});
  v.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addExtra(b.dataset.add,b.dataset.date));
  v.querySelectorAll('[data-del]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();delExtra(b.dataset.del,b.dataset.date,false);});
  const rst=document.getElementById('btn-reset');if(rst)rst.onclick=()=>{if(confirm('Esto borra TODOS tus registros y sesiones extra. ¿Seguro?')){store={logs:{},extras:{}};persist();render();toast('Todo borrado');}};
}
const TABS=[['week','Semana',IC.cal],['today','Hoy',IC.today],['progress','Progreso',IC.chart]];
function renderTabs(){document.getElementById('tabs').innerHTML=TABS.map(([k,l,ic])=>`<button class="tab ${view===k?'active':''}" data-tab="${k}">${ic}<span>${l}</span></button>`).join('');
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{view=b.dataset.tab;render();window.scrollTo(0,0);});}

/* ---------- theme ---------- */
function currentTheme(){return document.documentElement.getAttribute('data-theme')|| (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');}
function setThemeIcon(){document.getElementById('btn-theme').innerHTML= currentTheme()==='dark'?IC.sun:IC.moon;}
document.getElementById('btn-theme').onclick=()=>{const next=currentTheme()==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);try{localStorage.setItem('tria.theme',next);}catch(e){}setThemeIcon();};
try{const th=localStorage.getItem('tria.theme');if(th)document.documentElement.setAttribute('data-theme',th);}catch(e){}
setThemeIcon();

/* ---------- export / import ---------- */
document.getElementById('btn-export').innerHTML=IC.down;
document.getElementById('btn-import').innerHTML=IC.up;
document.getElementById('btn-export').onclick=()=>{
  const blob='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(store,null,2));
  const a=document.createElement('a');a.href=blob;a.download='tria-datos-'+todayISO+'.json';a.click();toast('Exportado');
};
document.getElementById('btn-import').onclick=()=>document.getElementById('file-import').click();
document.getElementById('file-import').onchange=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const data=JSON.parse(r.result);if(data&&data.logs){store={logs:data.logs||{},extras:data.extras||{}};persist();render();toast('Datos importados');}else alert('Archivo no válido.');}catch(err){alert('No se pudo leer el archivo.');}};
  r.readAsText(f);e.target.value='';};

/* ---------- global ---------- */
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeSheet();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&openId)closeSheet();});
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.innerHTML=IC.check+'<span>'+msg+'</span>';t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}

render();
</script>
